<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sen uchun Sarvara ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4fa3,#ff74b8,#ff9fd2,#ffc3e5);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
transition:.6s;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(.9);
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
border-radius:30px;
padding:35px 25px;
text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,.25);
color:white;
}

h1{
font-size:34px;
margin-bottom:15px;
}

h2{
font-size:28px;
margin-bottom:20px;
}

p{
font-size:18px;
line-height:1.6;
margin-bottom:25px;
}

button{
border:none;
padding:15px 22px;
border-radius:50px;
font-size:18px;
cursor:pointer;
margin:10px;
transition:.25s;
min-width:240px;
font-weight:bold;
}

.yes{
background:#fff;
color:#ff2c88;
}

.no{
background:#ff2c88;
color:white;
position:relative;
}

.yes:hover{
transform:scale(1.06);
}

#result h1{
font-size:42px;
}

#result p{
font-size:24px;
margin-top:20px;
}

.heart{
position:fixed;
bottom:-30px;
font-size:22px;
animation:fly linear forwards;
pointer-events:none;
}

@keyframes fly{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}
    <div class="screen hidden" id="q2">

<div class="card">

<h2>Qayerga boramiz?</h2>

<button class="yes" onclick="showQuestion(3)">
Shahar aylanamiz ✅
</button>

<br>

<button class="no">
Vaqtim bo'lmaydi ❌
</button>

<br>

<button class="no">
Hech qayerga ❌
</button>

</div>
</div>

<div class="screen hidden" id="q3">

<div class="card">

<h2>Qanaqa kino ko'ramiz?</h2>

<button class="yes" onclick="finishQuiz()">
Samolardan balanda ✅
</button>

<br>

<button class="no">
Ujis kino ❌
</button>

<br>

<button class="no">
O'zbek kino ❌
</button>

</div>
</div>

<div class="screen hidden" id="result">

<div class="card">

<h1>🥰</h1>

<h2>Uchrashuv tasdiqlandi!</h2>

<p>
Dushanba kuni seni kutaman,<br>
Sarvara! ❤️
</p>

</div>

</div>

<script>

const screens=[
document.getElementById("start"),
document.getElementById("q1"),
document.getElementById("q2"),
document.getElementById("q3"),
document.getElementById("result")
];

function hideAll(){
screens.forEach(s=>{
s.classList.add("hidden");
});
}

function showQuestion(num){
hideAll();
document.getElementById("q"+num).classList.remove("hidden");
    }function finishQuiz(){

hideAll();

document.getElementById("result").classList.remove("hidden");

for(let i=0;i<80;i++){

setTimeout(createHeart,i*120);

}

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=Math.random()>0.5?"❤️":"💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},7000);

}

const noButtons=document.querySelectorAll(".no");

function move(btn){

const x=Math.random()*(window.innerWidth-220);

const y=Math.random()*(window.innerHeight-80);

btn.style.position="fixed";
btn.style.left=x+"px";
btn.style.top=y+"px";
    noButtons.forEach(btn=>{

btn.addEventListener("mouseenter",()=>move(btn));

btn.addEventListener("touchstart",(e)=>{

e.preventDefault();

move(btn);

});

btn.addEventListener("click",(e)=>{

e.preventDefault();

move(btn);

});

});

for(let i=0;i<20;i++){

setTimeout(createHeart,i*400);

}

</script>

</body>

</html>

    }
