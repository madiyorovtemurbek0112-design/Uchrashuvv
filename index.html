<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Story</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}
body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.story{
    width:360px;
    height:640px;
    background:linear-gradient(135deg,#ff416c,#ff4b2b,#7b2ff7);
    border-radius:25px;
    overflow:hidden;
    position:relative;
    color:#fff;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

.progress{
    display:flex;
    gap:5px;
    padding:12px;
}

.bar{
    flex:1;
    height:4px;
    background:rgba(255,255,255,.3);
    border-radius:10px;
}

.bar.active{
    background:#fff;
}

.content{
    height:calc(100% - 28px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:25px;
    text-align:center;
}

h2{
    font-size:30px;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    position:relative;
    width:100%;
    height:150px;
}

button{
    padding:14px 26px;
    border:none;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

#yes{
    background:#00c853;
    color:white;
}

.run{
    position:absolute;
    background:#ff1744;
    color:white;
}
</style>
</head>

<body>

<div class="story">

<div class="progress">
<div class="bar active"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="content">

<h2 id="question">Meni yaxshi ko'rasanmi? ❤️</h2>

<div class="buttons" id="buttons">

<button id="yes">Ha ❤️</button>

<button class="run">Yo'q 😅</button>

<button class="run">Bilmayman 🙈</button>

</div>

</div>

</div>

<script>

const questions=[
"Meni yaxshi ko'rasanmi? ❤️",
"Meni sog'indingmi? 🥺",
"Dushanba uchrashamizmi? 😍"
];

let index=0;

const q=document.getElementById("question");
const yes=document.getElementById("yes");
const bars=document.querySelectorAll(".bar");

yes.onclick=function(){

index++;

if(index<questions.length){

q.innerHTML=questions[index];

bars.forEach((b,i)=>{
b.classList.toggle("active",i<=index);
});

}else{

document.querySelector(".content").innerHTML=`
<h2 style="font-size:34px;line-height:1.5">
🥰 Uchrashuv tasdiqlandi!<br><br>
Dushanba kuni seni kutaman ❤️
</h2>
`;

}

};

document.querySelectorAll(".run").forEach(btn=>{

btn.addEventListener("mouseover",move);
btn.addEventListener("touchstart",move);

function move(){

const parent=document.getElementById("buttons");

const x=Math.random()*(parent.clientWidth-110);

const y=Math.random()*(parent.clientHeight-50);

btn.style.left=x+"px";
btn.style.top=y+"px";

}

});

</script>

</body>
</html>
