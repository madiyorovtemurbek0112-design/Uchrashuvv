<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💕</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ffd9ea,#ffc2dd,#ffb2d2);
}

.card{
width:90%;
max-width:420px;
background:#fff;
border-radius:30px;
padding:35px 20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
position:relative;
}

h1{
color:#ff4d8d;
font-size:30px;
margin-bottom:15px;
}

#question{
font-size:20px;
color:#555;
margin-bottom:30px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:40px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

#yes{
background:#ff4d8d;
color:white;
}

.no{
background:white;
border:2px solid #ff4d8d;
color:#ff4d8d;
position:absolute;
width:240px;
left:50%;
transform:translateX(-50%);
}

#no1{
top:235px;
}

#no2{
top:305px;
}
    .no:hover{
transform:translateX(-50%) scale(1.05);
}

.fade{
animation:fade .4s;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}

.heart{
position:fixed;
font-size:24px;
animation:fly 4s linear infinite;
pointer-events:none;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card" id="card">

<h1>💕 Taklif 💕</h1>

<div id="question">
Dushanba kuni vaqting bormi?
</div>

<button id="yes" onclick="nextQuestion()">
Ha albatta ❤️
</button>

<button class="no" id="no1">
Band bo'lishim mumkin 😅
</button>

<button class="no" id="no2">
Bilmayman 🤭
</button>

</div>

<script>

let step=0;

const questions=[
"Dushanba kuni vaqting bormi? 💕",
"Meni bilan uchrashishga rozimisan? 🥰",
"Unda dushanba kuni uchrashamizmi? ❤️"
    
];
    function move(btn){

const x=Math.random()*(window.innerWidth-260);
const y=100+Math.random()*(window.innerHeight-220);

btn.style.left=x+"px";
btn.style.top=y+"px";

}

const no1=document.getElementById("no1");
const no2=document.getElementById("no2");

["mouseover","touchstart"].forEach(event=>{

no1.addEventListener(event,e=>{
if(event==="touchstart") e.preventDefault();
move(no1);
});

no2.addEventListener(event,e=>{
if(event==="touchstart") e.preventDefault();
move(no2);
});

});

function nextQuestion(){

step++;

if(step<questions.length){

document.getElementById("question").innerHTML=questions[step];

move(no1);
move(no2);

}else{

finish();

}

}
function finish(){

document.body.innerHTML=`
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ffd6e7,#ffc2da,#ffb3d1);
overflow:hidden;
font-family:Arial,sans-serif;
}

.box{
text-align:center;
color:white;
animation:pop .6s;
padding:20px;
}

.box h1{
font-size:42px;
margin-bottom:20px;
text-shadow:0 3px 10px rgba(0,0,0,.2);
}

.box p{
font-size:22px;
}

@keyframes pop{
from{
opacity:0;
transform:scale(.7);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

<div class="box">
<h1>🥰 Uchrashuv tasdiqlandi! ❤️</h1>
<p>Dushanba kuni seni kutaman 💖</p>
</div>
`;

for(let i=0;i<50;i++){

const heart=document.createElement("div");

heart.innerHTML="💖";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.top=(100+Math.random()*200)+"px";

heart.style.animationDuration=(2+Math.random()*4)+"s";

heart.style.fontSize=(18+Math.random()*20)+"px";

document.body.appendChild(heart);

}

}
    </script>

</body>
</html>
